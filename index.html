<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ניהול שוברים משותף</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; color: #333; }
        .header { display: flex; justify-content: space-between; align-items: center; max-width: 800px; margin: 0 auto 20px; }
        h1 { color: #1a73e8; margin: 0; font-size: 24px; }
        .add-btn { background: #34a853; color: white; border: none; width: 55px; height: 55px; border-radius: 50%; font-size: 35px; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.2); transition: transform 0.2s; display: flex; align-items: center; justify-content: center; }
        .add-btn:active { transform: scale(0.9); }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; max-width: 1000px; margin: 0 auto; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); position: relative; border-top: 6px solid #4285f4; display: flex; flex-direction: column; transition: 0.3s; }
        .card:hover { transform: translateY(-3px); }
        .card h3 { margin: 0 0 10px 0; color: #1a73e8; font-size: 1.3em; }
        .code-box { background: #fdfdfd; border: 1px dashed #bbb; padding: 10px; font-family: 'Courier New', Courier, monospace; font-size: 1.1em; font-weight: bold; display: block; margin: 10px 0; text-align: center; color: #333; border-radius: 5px; }
        .amount-label { font-size: 0.85em; color: #777; margin-bottom: 2px; }
        .amount { font-size: 1.8em; font-weight: bold; color: #d93025; margin-bottom: 15px; }
        .link-btn { display: inline-block; margin-bottom: 15px; color: #1a73e8; text-decoration: none; font-weight: 600; font-size: 0.95em; }
        .link-btn:hover { text-decoration: underline; }
        .action-btn { width: 100%; padding: 12px; border: none; border-radius: 8px; background: #1a73e8; color: white; cursor: pointer; font-weight: bold; font-size: 16px; margin-top: auto; }
        .action-btn:hover { background: #1557b0; }

        /* Modal Style */
        .modal { display: none; position: fixed; z-index: 100; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); backdrop-filter: blur(3px); }
        .modal-content { background: white; width: 90%; max-width: 400px; margin: 15% auto; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        h2 { margin-top: 0; color: #202124; }
        input { width: 100%; padding: 12px; margin: 12px 0; border: 1px solid #dadce0; border-radius: 8px; box-sizing: border-box; font-size: 16px; outline: none; }
        input:focus { border-color: #1a73e8; box-shadow: 0 0 0 2px rgba(26,115,232,0.2); }
        .save-btn { background: #34a853; color: white; border: none; width: 100%; padding: 14px; border-radius: 8px; font-size: 18px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .cancel-link { display: block; text-align: center; margin-top: 15px; color: #5f6368; cursor: pointer; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>

<div class="header">
    <h1>השוברים שלנו 🎁</h1>
    <button class="add-btn" onclick="toggleModal(true)">+</button>
</div>

<div class="grid" id="vouchersGrid">
    <p style="text-align: center; grid-column: 1/-1;">מתחבר לבסיס הנתונים...</p>
</div>

<div id="addModal" class="modal">
    <div class="modal-content">
        <h2>הוספת שובר חדש</h2>
        <input type="text" id="name" placeholder="שם השובר (למשל: מקדונלדס)">
        <input type="text" id="code" placeholder="קוד השובר">
        <input type="number" id="balance" placeholder="סכום התחלתי (בשקלים)">
        <input type="url" id="link" placeholder="לינק לאתר (אם יש)">
        <button class="save-btn" onclick="addVoucher()">Add</button>
        <span class="cancel-link" onclick="toggleModal(false)">ביטול</span>
    </div>
</div>

<script>
    // --- הגדרות FIREBASE שלך ---
    const firebaseConfig = {
        apiKey: "AIzaSyAsQRzlkZt1B2HS8HtIayVcsLXsuMe05rc",
        authDomain: "familyvouchers-12c67.firebaseapp.com",
        databaseURL: "https://familyvouchers-12c67-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "familyvouchers-12c67",
        storageBucket: "familyvouchers-12c67.firebasestorage.app",
        messagingSenderId: "290367429883",
        appId: "1:290367429883:web:21bcec52e7bfc2fd2de45e"
    };

    // אתחול Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function toggleModal(show) {
        document.getElementById('addModal').style.display = show ? 'block' : 'none';
        if(show) document.getElementById('name').focus();
    }

    // הוספת שובר חדש
    function addVoucher() {
        const name = document.getElementById('name').value;
        const code = document.getElementById('code').value;
        const balance = parseFloat(document.getElementById('balance').value);
        const link = document.getElementById('link').value;

        if (name && !isNaN(balance)) {
            const newVoucherRef = db.ref('vouchers').push();
            newVoucherRef.set({
                name: name,
                code: code || "אין קוד",
                balance: balance,
                link: link || ""
            }).then(() => {
                toggleModal(false);
                // ניקוי שדות
                document.getElementById('name').value = '';
                document.getElementById('code').value = '';
                document.getElementById('balance').value = '';
                document.getElementById('link').value = '';
            });
        } else {
            alert("נא להזין לפחות שם וסכום תקין.");
        }
    }

    // עדכון יתרה (מימוש)
    function updateBalance(id, currentBalance, name) {
        const spent = prompt(`מימוש עבור: ${name}\nכמה שקלים להוריד מהיתרה (₪${currentBalance.toFixed(2)})?`);
        
        if (spent !== null && spent !== "" && !isNaN(spent)) {
            const amountToSubtract = parseFloat(spent);
            const newBalance = Math.max(0, currentBalance - amountToSubtract);
            
            db.ref('vouchers/' + id).update({
                balance: newBalance
            });
        }
    }

    // האזנה לנתונים בזמן אמת
    db.ref('vouchers').on('value', (snapshot) => {
        const grid = document.getElementById('vouchersGrid');
        const data = snapshot.val();
        grid.innerHTML = '';
        
        if (!data) {
            grid.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: #666; margin-top: 50px;">אין שוברים ברשימה. לחצו על ה-+ כדי להתחיל!</p>';
            return;
        }

        for (let id in data) {
            const v = data[id];
            grid.innerHTML += `
                <div class="card">
                    <h3>${v.name}</h3>
                    <div class="code-box">${v.code}</div>
                    <div class="amount-label">יתרה נותרת:</div>
                    <div class="amount">₪${v.balance.toFixed(2)}</div>
                    ${v.link ? `<a href="${v.link}" target="_blank" class="link-btn">🔗 כניסה לאתר המימוש</a>` : '<div style="height:34px"></div>'}
                    <button class="action-btn" onclick="updateBalance('${id}', ${v.balance}, '${v.name}')">עדכן סכום שמומש</button>
                </div>
            `;
        }
    });
</script>
</body>
</html>
